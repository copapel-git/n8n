services:
  n8n:
    image: copapel/n8n:2.25.1
    container_name: n8n
    restart: always
    ports:
      - '5678:5678'
    environment:
      - N8N_PROTOCOL=https
      - N8N_HOST=n8n.copapel.com.br
      - N8N_PROXY_HOPS=1
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.copapel.com.br/
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=143.0.121.89
      - DB_POSTGRESDB_PORT=5433
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
    external: true
    name: n8n_n8n_data

networks:
  default:
    external: true
    name: n8n_default
